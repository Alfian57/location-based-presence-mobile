name: Mobile CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - mobile-v*
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: Test Flutter Mobile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: flutter test

  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          MOBILE_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL }}
        run: |
          API_BASE_URL="${MOBILE_API_BASE_URL:-https://example.com/api/mobile}"
          flutter build apk --release --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Prepare APK artifact
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-snapshot}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/presensi-mobile-${TAG_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: presensi-mobile-release-apk
          path: build/app/outputs/flutter-apk/presensi-mobile-*.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/presensi-mobile-*.apk
          generate_release_notes: true
