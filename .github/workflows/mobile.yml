name: Mobile CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - mobile-v*
      - v*
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag release untuk APK manual.
        required: false
        default: mobile-latest

permissions:
  contents: write

jobs:
  test:
    name: Test Flutter Mobile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: flutter test

  build-release-apk:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          MOBILE_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL }}
        run: |
          # Boleh diisi domain root, /api, atau /api/mobile.
          # Aplikasi akan menormalkan nilai ini ke endpoint /api/mobile.
          API_BASE_URL="${MOBILE_API_BASE_URL:-https://example.com/api/mobile}"
          flutter build apk --release --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="Presensi Mobile ${GITHUB_REF_NAME}"
            PRERELEASE="false"
            MAKE_LATEST="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.release_tag }}"
            RELEASE_NAME="Presensi Mobile ${TAG_NAME}"
            PRERELEASE="true"
            MAKE_LATEST="false"
          else
            TAG_NAME="mobile-latest"
            RELEASE_NAME="Presensi Mobile Latest APK"
            PRERELEASE="true"
            MAKE_LATEST="false"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"
          cp build/app/outputs/flutter-apk/app-release.apk "presensi-mobile-${TAG_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: presensi-mobile-release-apk
          path: presensi-mobile-*.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.release_name }}
          body: |
            APK release dibangun otomatis oleh GitHub Actions.

            Commit: ${{ github.sha }}
            API base URL: `${{ vars.MOBILE_API_BASE_URL || 'https://example.com/api/mobile' }}`
          files: presensi-mobile-*.apk
          generate_release_notes: true
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: ${{ steps.release.outputs.make_latest }}
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Write release summary
        run: |
          echo "APK published to GitHub Release: ${{ steps.release.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
